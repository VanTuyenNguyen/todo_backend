<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Users</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container { max-width: 960px; margin: 0 auto; }

        h1 { font-size: 26px; color: #1a1a2e; margin-bottom: 20px; }
        h1 span {
            background: #4f46e5; color: white;
            padding: 2px 10px; border-radius: 6px;
            font-size: 14px; margin-left: 8px; vertical-align: middle;
        }

        .toolbar {
            display: flex; gap: 10px; margin-bottom: 20px;
        }

        .search-bar {
            flex: 1; padding: 10px 14px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; outline: none;
        }
        .search-bar:focus { border-color: #4f46e5; }

        .btn {
            padding: 10px 18px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger  { background: #ef4444; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }

        table {
            width: 100%; background: white;
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border-collapse: collapse;
        }

        thead { background: #4f46e5; color: white; }
        thead th { padding: 13px 18px; text-align: left; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }

        tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f5f3ff; }
        tbody td { padding: 12px 18px; font-size: 14px; color: #333; }

        .badge-id {
            background: #ede9fe; color: #4f46e5;
            padding: 3px 10px; border-radius: 20px;
            font-weight: 600; font-size: 13px;
        }

        .actions { display: flex; gap: 8px; }

        /* Modal */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 100;
            align-items: center; justify-content: center;
        }
        .overlay.active { display: flex; }

        .modal {
            background: white; border-radius: 12px;
            padding: 28px; width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .modal h2 { margin-bottom: 20px; font-size: 18px; color: #1a1a2e; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; outline: none;
        }
        .form-group input:focus { border-color: #4f46e5; }

        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #e5e7eb; color: #333; }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            padding: 12px 20px; border-radius: 8px;
            color: white; font-size: 14px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s;
            z-index: 200;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #10b981; }
        .toast.error   { background: #ef4444; }

        .empty { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <h1>Quản lý Users <span id="count">0</span></h1>

    <div class="toolbar">
        <input class="search-bar" id="search" type="text" placeholder="Tìm theo tên hoặc email..." />
        <button class="btn btn-primary" onclick="openModal()">+ Thêm user</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th><th>Họ tên</th><th>Email</th><th>Tuổi</th><th>Ngày tạo</th><th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr><td colspan="6" class="empty">Đang tải...</td></tr>
        </tbody>
    </table>
</div>

<!-- Modal thêm / sửa -->
<div class="overlay" id="overlay">
    <div class="modal">
        <h2 id="modal-title">Thêm user</h2>
        <input type="hidden" id="edit-id" />
        <div class="form-group">
            <label>Họ tên</label>
            <input type="text" id="f-name" placeholder="Nguyễn Văn A" />
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="f-email" placeholder="example@email.com" />
        </div>
        <div class="form-group">
            <label>Tuổi</label>
            <input type="number" id="f-age" placeholder="25" min="1" max="120" />
        </div>
        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="closeModal()">Hủy</button>
            <button class="btn btn-primary" onclick="saveUser()">Lưu</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    let allUsers = [];

    async function fetchUsers() {
        try {
            const res = await fetch('/users');
            allUsers = await res.json();
            document.getElementById('count').textContent = allUsers.length;
            renderTable(allUsers);
        } catch {
            showToast('Không thể tải dữ liệu', 'error');
        }
    }

    function renderTable(users) {
        const tbody = document.getElementById('table-body');
        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty">Không có dữ liệu.</td></tr>';
            return;
        }
        tbody.innerHTML = users.map(u => `
            <tr>
                <td><span class="badge-id">#${u.id}</span></td>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${u.age}</td>
                <td>${new Date(u.created_at).toLocaleDateString('vi-VN')}</td>
                <td>
                    <div class="actions">
                        <button class="btn btn-warning btn-sm" onclick="openEdit(${u.id})">Sửa</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${u.name}')">Xóa</button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // Tìm kiếm
    document.getElementById('search').addEventListener('input', function () {
        const q = this.value.toLowerCase();
        renderTable(allUsers.filter(u =>
            u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
        ));
    });

    // Mở modal thêm
    function openModal() {
        document.getElementById('modal-title').textContent = 'Thêm user';
        document.getElementById('edit-id').value = '';
        document.getElementById('f-name').value = '';
        document.getElementById('f-email').value = '';
        document.getElementById('f-age').value = '';
        document.getElementById('overlay').classList.add('active');
    }

    // Mở modal sửa
    function openEdit(id) {
        const user = allUsers.find(u => u.id === id);
        if (!user) return;
        document.getElementById('modal-title').textContent = 'Sửa user';
        document.getElementById('edit-id').value = user.id;
        document.getElementById('f-name').value = user.name;
        document.getElementById('f-email').value = user.email;
        document.getElementById('f-age').value = user.age;
        document.getElementById('overlay').classList.add('active');
    }

    function closeModal() {
        document.getElementById('overlay').classList.remove('active');
    }

    // Lưu (thêm hoặc sửa)
    async function saveUser() {
        const id    = document.getElementById('edit-id').value;
        const name  = document.getElementById('f-name').value.trim();
        const email = document.getElementById('f-email').value.trim();
        const age   = parseInt(document.getElementById('f-age').value);

        if (!name || !email || !age) {
            showToast('Vui lòng điền đầy đủ thông tin', 'error');
            return;
        }

        const isEdit = !!id;
        const url    = isEdit ? `/users/${id}` : '/users';
        const method = isEdit ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, age })
            });
            if (!res.ok) throw new Error();
            closeModal();
            showToast(isEdit ? 'Cập nhật thành công!' : 'Thêm thành công!', 'success');
            fetchUsers();
        } catch {
            showToast('Có lỗi xảy ra', 'error');
        }
    }

    // Xóa
    async function deleteUser(id, name) {
        if (!confirm(`Xóa user "${name}"?`)) return;
        try {
            await fetch(`/users/${id}`, { method: 'DELETE' });
            showToast('Đã xóa thành công!', 'success');
            fetchUsers();
        } catch {
            showToast('Xóa thất bại', 'error');
        }
    }

    // Toast
    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Đóng modal khi click ngoài
    document.getElementById('overlay').addEventListener('click', function (e) {
        if (e.target === this) closeModal();
    });

    fetchUsers();
</script>
</body>
</html>
