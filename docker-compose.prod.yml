services:
  db:
    image: postgres:15
    container_name: tutor_db_prod
    restart: always
    env_file:
      - .env.prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutor_app_prod
    ports:
      - "8080:3000"
    env_file:
      - .env.prod
    environment:
      DB_HOST: db
    restart: always
    depends_on:
      - db

volumes:
  pgdata_prod:
