services:
  db:
    image: postgres:15
    container_name: tutor_db_prod
    restart: always
    env_file:
      - .env.prod
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data

  app:
    image: node:20-alpine
    container_name: tutor_app_prod
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      DB_HOST: db
    command: sh -c "npm install --omit=dev && node index.js"
    restart: always
    depends_on:
      - db

volumes:
  pgdata_prod:
