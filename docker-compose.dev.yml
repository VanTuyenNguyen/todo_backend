services:
  db:
    image: postgres:15
    container_name: tutor_db_dev
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutor_app_dev
    ports:
      - "3000:3000"
    env_file:
      - .env.dev
    environment:
      DB_HOST: db
    depends_on:
      - db

volumes:
  pgdata_dev:
